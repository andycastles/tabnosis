<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tabnosis</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #111;
      }

      /* ── Frame container ─────────────────────────────────── */
      #frames-container {
        display: flex;
        width: 100%;
        height: 100%;
      }
      #frames-container.horizontal {
        flex-direction: row;
      }
      #frames-container.vertical {
        flex-direction: column;
      }

      /* ── Frame wrapper ───────────────────────────────────── */
      .frame-wrapper {
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
        transition: flex 0.25s ease;
      }
      .frame-wrapper.maximized {
        flex: 100 1 0 !important;
      }
      #frames-container.vertical .frame-wrapper.minimized {
        flex: 0 0 32px !important;
      }
      #frames-container.horizontal .frame-wrapper.minimized {
        flex: 0 0 32px !important;
      }

      /* ── Handle bar ──────────────────────────────────────── */
      .frame-handle {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(10, 10, 10, 0.82);
        backdrop-filter: blur(6px);
        cursor: pointer;
        user-select: none;
        color: #ccc;
        font-size: 12px;
        transition: background 0.15s;
      }
      .frame-handle:hover {
        background: rgba(10, 10, 10, 0.95);
      }

      /* Horizontal layout: horizontal bar at top of each column */
      #frames-container.horizontal .frame-handle {
        flex-direction: row;
        height: 32px;
        padding: 0 10px;
      }
      /* When a column is minimized, make the handle a vertical strip */
      #frames-container.horizontal .frame-wrapper.minimized .frame-handle {
        flex-direction: column-reverse;
        height: 100%;
        width: 32px;
        padding: 10px 0;
        justify-content: flex-end;
      }
      #frames-container.horizontal .frame-wrapper.minimized .frame-title {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        max-height: 180px;
      }
      #frames-container.horizontal .frame-wrapper.minimized .max-btn {
        font-size: 11px;
        transform: rotate(90deg);
      }

      /* Vertical layout: horizontal bar at top of each row */
      #frames-container.vertical .frame-handle {
        flex-direction: row;
        height: 32px;
        padding: 0 10px;
      }

      .frame-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.8;
      }
      .max-btn {
        background: none;
        border: none;
        color: #ccc;
        cursor: pointer;
        font-size: 14px;
        padding: 4px 6px;
        border-radius: 4px;
        opacity: 0.6;
        flex-shrink: 0;
        line-height: 1;
        transition:
          opacity 0.15s,
          background 0.15s;
      }
      .max-btn:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
      }

      /* ── iFrame ──────────────────────────────────────────── */
      .frame-wrapper iframe {
        flex: 1 1 0;
        border: none;
        width: 100%;
        min-height: 0;
        display: block;
      }

      /* ── Empty state ─────────────────────────────────────── */
      #empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        width: 100%;
        height: 100%;
        color: #555;
      }
      #empty-state svg {
        opacity: 0.4;
      }
      #empty-state p {
        font-size: 16px;
        color: #666;
      }
      #empty-state .hint {
        font-size: 13px;
        color: #444;
      }

      /* ── Settings toggle button ──────────────────────────── */
      #settings-btn {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 200;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: rgba(20, 20, 20, 0.75);
        color: #aaa;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.35;
        transition:
          opacity 0.2s,
          background 0.2s;
        backdrop-filter: blur(4px);
      }
      #settings-btn:hover {
        opacity: 1;
        background: rgba(40, 40, 40, 0.95);
      }

      /* ── Settings overlay + panel ────────────────────────── */
      #settings-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0, 0, 0, 0.4);
      }
      #settings-overlay.open {
        display: block;
      }

      #settings-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 360px;
        background: #1e1e2e;
        color: #cdd6f4;
        display: flex;
        flex-direction: column;
        box-shadow: -6px 0 28px rgba(0, 0, 0, 0.6);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        flex-shrink: 0;
      }
      .panel-header h2 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #settings-close {
        background: none;
        border: none;
        color: #666;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        line-height: 1;
      }
      #settings-close:hover {
        color: #cdd6f4;
        background: rgba(255, 255, 255, 0.08);
      }

      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .panel-section h3 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: #666;
        margin-bottom: 12px;
      }

      /* URL list */
      #url-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 10px;
      }
      .url-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        padding: 8px 10px;
      }
      .url-text {
        flex: 1;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.8;
      }
      .remove-btn {
        background: none;
        border: none;
        color: #f38ba8;
        cursor: pointer;
        font-size: 13px;
        padding: 2px 6px;
        border-radius: 4px;
        opacity: 0.65;
        flex-shrink: 0;
        line-height: 1;
      }
      .remove-btn:hover {
        opacity: 1;
        background: rgba(243, 139, 168, 0.12);
      }

      .add-row {
        display: flex;
        gap: 8px;
      }
      #url-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: #cdd6f4;
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
      }
      #url-input:focus {
        border-color: #89b4fa;
        background: rgba(137, 180, 250, 0.06);
      }
      #url-input::placeholder {
        color: #444;
      }
      #url-add-btn {
        background: #313244;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        color: #cdd6f4;
        font-size: 13px;
        padding: 8px 14px;
        cursor: pointer;
        white-space: nowrap;
      }
      #url-add-btn:hover {
        background: #45475a;
      }

      /* Direction toggle */
      .dir-toggle {
        display: flex;
        gap: 10px;
      }
      .dir-opt {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 14px 8px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        font-size: 12px;
        color: #666;
        transition: all 0.15s;
      }
      .dir-opt:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #aaa;
      }
      .dir-opt.selected {
        border-color: #89b4fa;
        color: #cdd6f4;
        background: rgba(137, 180, 250, 0.08);
      }

      /* CSS-drawn split preview icons */
      .dir-icon {
        display: flex;
        flex-direction: row;
        gap: 3px;
        width: 38px;
        height: 26px;
      }
      .dir-icon.stacked {
        flex-direction: column;
      }
      .dir-slab {
        flex: 1;
        background: currentColor;
        border-radius: 2px;
        opacity: 0.5;
      }
      .dir-opt.selected .dir-slab {
        opacity: 0.9;
      }

      /* Panel footer */
      .panel-footer {
        padding: 16px 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      #settings-save {
        flex: 1;
        background: #89b4fa;
        color: #1e1e2e;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        padding: 10px;
        cursor: pointer;
        transition: background 0.15s;
      }
      #settings-save:hover {
        background: #b4cefa;
      }
      #settings-cancel {
        background: rgba(255, 255, 255, 0.05);
        color: #666;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        font-size: 14px;
        padding: 10px 16px;
        cursor: pointer;
      }
      #settings-cancel:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #cdd6f4;
      }
    </style>
  </head>
  <body>
    <div id="frames-container" class="horizontal"></div>

    <button id="settings-btn" title="Settings">⚙</button>

    <div id="settings-overlay">
      <div id="settings-panel">
        <div class="panel-header">
          <h2>Settings</h2>
          <button id="settings-close" title="Close">✕</button>
        </div>

        <div class="panel-body">
          <div class="panel-section">
            <h3>URLs</h3>
            <div id="url-list"></div>
            <div class="add-row">
              <input
                type="url"
                id="url-input"
                placeholder="https://example.com"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="url-add-btn">Add</button>
            </div>
          </div>

          <div class="panel-section">
            <h3>Split Direction</h3>
            <div class="dir-toggle">
              <button class="dir-opt selected" id="dir-horizontal">
                <div class="dir-icon">
                  <div class="dir-slab"></div>
                  <div class="dir-slab"></div>
                </div>
                Side by side
              </button>
              <button class="dir-opt" id="dir-vertical">
                <div class="dir-icon stacked">
                  <div class="dir-slab"></div>
                  <div class="dir-slab"></div>
                </div>
                Stacked
              </button>
            </div>
          </div>
        </div>

        <div class="panel-footer">
          <button id="settings-cancel">Cancel</button>
          <button id="settings-save">Save &amp; Apply</button>
        </div>
      </div>
    </div>

    <script src="tabnosis.js"></script>
  </body>
</html>
